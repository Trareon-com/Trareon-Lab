name: CI

on:
  push:
    branches: [main, "foundation/**"]
  pull_request:

jobs:
  test:
    name: cargo-test-workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install Linux GUI deps for Slint
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libfontconfig1-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcursor-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev
      - name: Test workspace (core crates)
        run: cargo test --workspace --exclude lab-slint
      - name: UI model smoke (no display)
        run: cargo test -p lab-slint --no-default-features --tests
      - name: Slint GUI compile + tests
        run: cargo test -p lab-slint --features gui
      - name: Clippy
        run: |
          cargo clippy --workspace --all-targets --exclude lab-slint -- -D warnings
          cargo clippy -p lab-slint --all-targets --features gui -- -D warnings
      - name: Format check
        run: cargo fmt --all -- --check
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit
        # Ignores: .cargo/audit.toml (documented in docs/DEPENDENCY-AUDIT.md)
        # Official Day 03 chose cargo-audit over cargo-deny; policy is docs/DEPENDENCY-AUDIT.md

  secrets:
    name: gitleaks-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # gitleaks-action v3.0.0 (Node 24) — pin by commit SHA
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  geiger:
    name: cargo-geiger-warn
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked
      - name: Unsafe inventory (warn-only)
        run: cargo geiger --workspace --all-features || true

  sbom:
    name: sbom-cargo-metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - name: Generate SBOM from cargo metadata
        run: |
          mkdir -p release-evidence/sbom
          cargo metadata --format-version 1 --all-features > release-evidence/sbom/sbom-cargo-metadata.json
          test -s release-evidence/sbom/sbom-cargo-metadata.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          raw = Path("release-evidence/sbom/sbom-cargo-metadata.json").read_text()
          data = json.loads(raw)
          packages = sorted(
              {
                  f"{p.get('name')}@{p.get('version')}"
                  for p in data.get("packages", [])
                  if p.get("name") and p.get("version")
              }
          )
          Path("release-evidence/sbom/package-inventory.txt").write_text(
              "\n".join(packages) + ("\n" if packages else "")
          )
          print(f"packages={len(packages)}")
          PY
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cargo-metadata
          path: |
            release-evidence/sbom/sbom-cargo-metadata.json
            release-evidence/sbom/package-inventory.txt
